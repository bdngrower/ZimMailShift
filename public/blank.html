      O MSAL processa o token e fecha o popup automaticamente.
      Não adicione conteúdo aqui.
    -->
    <script type="module">
      // Ao retornar do popup da Microsoft, o MSAL no contexto pai
      // irá capturar o resultado. Esta página pode simplesmente fechar.
      if (window.opener) {
        // handled by MSAL on the parent window
      }
    </script>
  </body>
</html>
